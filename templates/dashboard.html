<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Attention Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Base Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            /* Same dark gradient + background image from the Register page */
            background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.85)), 
                        url("{{ url_for('static', filename='images/register_bg.jpg') }}") no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            position: relative;
            overflow: hidden;
        }

        /* The Frosted Glass Container - Wider for Dashboard */
        .glass-dashboard {
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 24px;
            padding: 50px;
            width: 90%;
            max-width: 1100px;
            position: relative;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            z-index: 10;
            overflow: hidden;
        }

        /* Top Header Area (Title Left, User Right) */
        .top-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 50px;
        }

        .title-section h1 {
            font-size: 36px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 10px;
        }

        .title-section p {
            font-size: 16px;
            color: #94a3b8;
        }

        .user-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-greeting {
            text-align: right;
        }

        .user-greeting .welcome-text {
            display: block;
            color: #bae6fd;
            font-size: 0.85rem;
        }

        .user-greeting .username {
            display: block;
            color: white;
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 0.5px;
        }

        /* Logout Button - Reddish Glassmorphism */
        .logout-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            color: #fca5a5;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.25);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
            color: #ffffff;
        }

        /* Cards Container */
        .cards-container {
            display: flex;
            gap: 30px;
            margin-bottom: 40px;
            position: relative;
            z-index: 2;
        }

        /* Individual Cards */
        .card {
            flex: 1;
            background: rgba(0, 0, 0, 0.4); /* Dark translucent background */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 50px 30px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .card:hover {
            transform: translateY(-8px);
            background: rgba(0, 0, 0, 0.6);
        }

        /* Card Specific Colors (Cyan & Orange) */
        .card.cyan:hover {
            border-color: rgba(34, 211, 238, 0.5);
            box-shadow: 0 10px 30px rgba(34, 211, 238, 0.15);
        }

        .card.orange:hover {
            border-color: rgba(251, 146, 60, 0.5);
            box-shadow: 0 10px 30px rgba(251, 146, 60, 0.15);
        }

        .card svg {
            width: 48px;
            height: 48px;
            margin-bottom: 10px;
        }

        .card h3 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Pill Buttons inside Cards */
        .btn-pill {
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .btn-pill.cyan {
            background: rgba(34, 211, 238, 0.15);
            color: #22d3ee;
            border: 1px solid rgba(34, 211, 238, 0.3);
        }

        .btn-pill.orange {
            background: rgba(251, 146, 60, 0.15);
            color: #fb923c;
            border: 1px solid rgba(251, 146, 60, 0.3);
        }

        /* Bottom Glowing SVG Chart */
        .chart-container {
            position: absolute;
            bottom: -20px;
            left: 0;
            width: 100%;
            height: 150px;
            z-index: 1;
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="glass-dashboard">
        
        <!-- Top Section: Title & User Info -->
        <div class="top-section">
            <div class="title-section">
                <h1>Attention & Engagement <br> Analytics</h1>
                <p>Real-Time Human Insight System</p>
            </div>

            <div class="user-controls">
                <!-- User Greeting -->
                <div class="user-greeting">
                    <span class="welcome-text">Welcome,</span>
                    <span class="username">{{ username }}</span>
                </div>

                <!-- Logout Button -->
                <a href="{{ url_for('logout') }}" class="logout-btn">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    Logout
                </a>
            </div>
        </div>

        <!-- Main Cards -->
        <div class="cards-container">
            <!-- START ANALYSIS CARD (LINKED TO MONITOR) -->
            <a href="{{ url_for('monitor') }}" class="card cyan">
                <svg viewBox="0 0 24 24" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                    <circle cx="12" cy="13" r="4"></circle>
                </svg>
                <h3>Start New Analysis</h3>
                <span class="btn-pill cyan">Run Detection</span>
            </a>

            <!-- VIEW REPORTS CARD -->
            <a href="{{ url_for('archives') }}" class="card orange">
                <svg viewBox="0 0 24 24" fill="none" stroke="#fb923c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                </svg>
                <h3>View Reports</h3>
                <span class="btn-pill orange">Archives</span>
            </a>
        </div>

        <!-- Decorative Bottom Chart -->
        <div class="chart-container">
            <svg viewBox="0 0 1000 150" preserveAspectRatio="none" style="width: 100%; height: 100%;">
                <path d="M0,100 Q50,100 80,90 T150,80 T200,110 T250,50 T300,120 T350,90 T400,100 T500,20 T550,130 T600,80 T650,40 T700,100 T800,90 T1000,100" fill="none" stroke="#22d3ee" stroke-width="2" />
                <path d="M0,100 Q50,100 80,90 T150,80 T200,110 T250,50 T300,120 T350,90 T400,100 T500,20 T550,130 T600,80 T650,40 T700,100 T800,90 T1000,100 V150 H0 Z" fill="rgba(34, 211, 238, 0.05)" stroke="none" />
            </svg>
        </div>

    </div>
</body>
</html>
